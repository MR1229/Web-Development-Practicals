<!DOCTYPE html>
<html>
<head>
<title>Employee Registration</title>
</head>

<body bgcolor="#f0f8ff">

<h1 align="center">Employee Registration Form</h1>
<hr>

<form action="success.html" method="get">

<label>First Name:</label>
<input type="text" name="fname" required>
<br><br>

<label>Last Name:</label>
<input type="text" name="lname" required>
<br><br>

<label>Password:</label>
<input type="password" name="pass" required>
<br><br>

<label>Address:</label><br>
<textarea name="address" rows="4" cols="40"></textarea>
<br><br>

<label>Mobile Number:</label>
<input type="text" name="mobile">
<br><br>

<label>Gender:</label><br>
<input type="radio" name="gender" value="Male"> Male<br>
<input type="radio" name="gender" value="Female"> Female<br><br>

<label>Department:</label>
<select name="dept">
<option>--Select--</option>
<option>HR</option>
<option>IT</option>
<option>Finance</option>
<option>Marketing</option>
</select>
<br><br>

<label>Technical Skills:</label><br>
<input type="checkbox" name="skill" value="HTML"> HTML<br>
<input type="checkbox" name="skill" value="CSS"> CSS<br>
<input type="checkbox" name="skill" value="Java"> Java<br>
<input type="checkbox" name="skill" value="Python"> Python<br><br>

<input type="submit" value="Register">

</form>

</body>
</html>
