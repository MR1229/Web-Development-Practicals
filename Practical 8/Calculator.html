<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
</head>

<body bgcolor="Black">

<h2 align="center">Calculator</h2>

<table border="1" align="center" cellpadding="20">

<tr bgcolor="silver">
<td colspan="4">
<input type="text" value="0" size="35">
</td>
</tr>

<tr>
<td bgcolor="teal">AC</td>
<td bgcolor="gray">( )</td>
<td bgcolor="gray">%</td>
<td bgcolor="gray">/</td>
</tr>

<tr>
<td bgcolor="darkgray">7</td>
<td bgcolor="darkgray">8</td>
<td bgcolor="darkgray">9</td>
<td bgcolor="gray">*</td>
</tr>

<tr>
<td bgcolor="darkgray">4</td>
<td bgcolor="darkgray">5</td>
<td bgcolor="darkgray">6</td>
<td bgcolor="gray">-</td>
</tr>

<tr>
<td bgcolor="darkgray">1</td>
<td bgcolor="darkgray">2</td>
<td bgcolor="darkgray">3</td>
<td bgcolor="gray">+</td>
</tr>

<tr>
<td bgcolor="darkgray" colspan="2">0</td>
<td bgcolor="darkgray">.</td>
<td bgcolor="lightblue">=</td>
</tr>

</table>

</body>
</html>
